<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table in Html</title>
</head>

<body>
    <h1 style="text-align: center;">Student Details</h1>
    <table border="2" cellspacing="1" cellpadding="15" align="center">

            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Course</th>
                <th>City</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Aryan</td>
                <td>23</td>
                <td>B.Tech</td>
                <td>Rohtak</td>
            </tr>
            <tr>
                <td>Hardik</td>
                <td>21</td>
                <td>MCA</td>
                <td>Jind</td>
            </tr>
            <tr>
                <td>Shruti</td>
                <td>22</td>
                <td>B.Tech</td>
                <td>Hisar</td>
            </tr>
            <tr>
                <td>Krish</td>
                <td>24</td>
                <td>MCA</td>
                <td rowspan="3">Jind</td>
            </tr>
            <tr>
                <td>Vaishali</td>
                <td>23</td>
                <td>B.Tech</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
