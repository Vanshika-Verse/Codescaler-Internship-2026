<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested Tables in html</title>
</head>

<body>
    <h1>
        <center>Nested Table Example</center>
    </h1>
    <table border="1" cellspacing="0" cellpadding="15" align="center">
        <thead>
            <tr>
                <th>Name</th>
                <th>Rollno.</th>
                <th>Percentage</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Vihaan</td>
                <td>21</td>
                <td>92%</td>
            </tr>

            <tr>
                <td>Raghav</td>

                <td>23
                    
                    <br><br>

                    <table border="1" cellspacing="0" cellpadding="15">
                        <tr>
                            <th>Subject Code</th>
                            <th>Subject Name</th>
                            <th>Marks</th>
                        </tr>

                        <tr>
                            <td>M24-CAP-201</td>
                            <td>DataBase Management System</td>
                            <td>79</td>
                        </tr>

                        <tr>
                            <td>M24-CAP-202</td>
                            <td>Artificial Intelligence</td>
                            <td>85</td>
                        </tr>

                        <tr>
                            <td>M24-CAP-203</td>
                            <td>Machine Learning</td>
                            <td>88</td>
                        </tr>
                    </table>
                </td>

                <td>90%</td>
            </tr>

            <tr>
                <td>Mehak</td>
                <td>24</td>
                <td>89%</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
